  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<title>Contact C4 Variations<\u002Ftitle>\n\n<style>/* Addept Automotive — self-hosted webfonts (latin subsets from Google Fonts).\n   Inter: 400 / 600 / 700 / 800 · Space Grotesk: 500 / 700 */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"5ceef49f-fdee-4ba1-a437-58e0dccb5f10\") format('woff2');\n}\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"27858e28-3fa9-4110-8889-f6bfee26a86c\") format('woff2');\n}\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"3a973c10-c146-40ce-80d0-0be8bfc474ab\") format('woff2');\n}\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"41614d6b-63d6-4b4b-a68c-304b736688a3\") format('woff2');\n}\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"d9d0f665-ac23-4754-b7ae-0fc142f47d6a\") format('woff2');\n}\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"97e7a5b2-ccb3-4ea4-bb2a-4b0f7d0851ab\") format('woff2');\n}\n\n/* Addept Automotive — color tokens.\n   Source of truth: deploy/embed.js (addept-landing repo).\n   The system is monochrome cinema: pure black stage, white ink at strict\n   opacity tiers, one warm amber glow accent, and a near-black violet ink\n   reserved for frosted-glass card text. */\n:root {\n  /* ── Base palette ── */\n  --black: #000000;\n  --black-flow: #050505;          /* flow-mode body (booking / FAQ / contact) */\n  --black-capsule: rgba(10, 10, 10, 0.55);\n  --black-label: rgba(5, 5, 5, 0.78);\n  --white: #ffffff;\n  --ink-glass: #181520;           /* text & icons on frosted glass cards */\n  --amber-glow: rgba(255, 166, 77, 0.5);\n  --amber-glow-deep: rgba(255, 120, 40, 0.28);\n\n  /* ── White-opacity text ramp (use these, never new alphas) ── */\n  --text-max: #ffffff;                       /* hover / emphasis */\n  --text-primary: rgba(255, 255, 255, 0.9);  /* brand wordmark, strong UI */\n  --text-strong: rgba(255, 255, 255, 0.88);  /* FAQ questions, list titles */\n  --text-emphasis: rgba(255, 255, 255, 0.85);/* hours day labels */\n  --text-label: rgba(255, 255, 255, 0.78);   /* annotation labels */\n  --text-soft: rgba(255, 255, 255, 0.7);     /* chips */\n  --text-body: rgba(255, 255, 255, 0.58);    /* lead paragraphs */\n  --text-secondary: rgba(255, 255, 255, 0.55);/* eyebrows, side copy */\n  --text-answer: rgba(255, 255, 255, 0.5);   /* FAQ answers */\n  --text-muted: rgba(255, 255, 255, 0.45);   /* meta rows, hours values */\n  --text-faint: rgba(255, 255, 255, 0.38);   /* tick rows */\n  --text-dim: rgba(255, 255, 255, 0.35);     /* tiny captions, labels */\n  --text-disabled: rgba(255, 255, 255, 0.3); /* footnote contact line */\n  --text-footer: rgba(255, 255, 255, 0.25);  /* copyright */\n  --text-ghost: rgba(255, 255, 255, 0.07);   /* giant ghost words */\n\n  /* ── Hairlines & borders (white-opacity ramp) ── */\n  --border-strong: rgba(255, 255, 255, 0.25);   /* meta chips */\n  --border-ghost-btn: rgba(255, 255, 255, 0.22);/* ghost buttons */\n  --hairline: rgba(255, 255, 255, 0.22);        /* drawn rules */\n  --border-default: rgba(255, 255, 255, 0.18);  /* nav call pill */\n  --border-list: rgba(255, 255, 255, 0.14);     /* FAQ hairline list */\n  --border-subtle: rgba(255, 255, 255, 0.12);   /* eyebrows, labels */\n  --border-faint: rgba(255, 255, 255, 0.1);     /* scroll hint */\n  --border-whisper: rgba(255, 255, 255, 0.08);  /* contact boxes */\n  --border-footer: rgba(255, 255, 255, 0.06);   /* footer rule */\n\n  /* ── Surfaces ── */\n  --surface-page: var(--black);\n  --surface-flow: var(--black-flow);\n  --surface-capsule: var(--black-capsule);       /* eyebrows, ghost buttons */\n  --surface-overlay: rgba(0, 0, 0, 0.6);         /* scroll hint, dot tooltips */\n  --surface-overlay-strong: rgba(0, 0, 0, 0.7);\n  --surface-tint: rgba(255, 255, 255, 0.02);     /* contact boxes */\n  --surface-tint-hover: rgba(255, 255, 255, 0.05);\n  --surface-light: #ffffff;                      /* light buttons, cal panel */\n\n  /* ── Frosted glass card (Noomo-style fleet) ── */\n  --glass-gradient: linear-gradient(168deg, rgba(252, 253, 255, 0.16) 0%, rgba(237, 239, 246, 0.085) 42%, rgba(196, 201, 215, 0.14) 100%); /* @kind color */\n  --glass-fill: rgba(237, 239, 246, 0.085);\n  --glass-border: rgba(255, 255, 255, 0.32);\n  --glass-ink: var(--ink-glass);\n}\n\n/* Addept Automotive — typography tokens.\n   Two faces only: Inter carries everything; Space Grotesk (uppercase, medium)\n   is reserved for \"giant\" cinematic statements. */\n:root {\n  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-display: 'Space Grotesk', 'Inter', sans-serif;\n\n  /* ── Weights ── */\n  --weight-regular: 400;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-heavy: 800;     /* all Inter headlines */\n  --weight-giant: 500;     /* Space Grotesk statements */\n\n  /* ── Sizes (fluid) ── */\n  --size-h1: clamp(2.6rem, 7vw, 5rem);\n  --size-h1-compact: clamp(2.2rem, 5.5vw, 3.8rem);\n  --size-h2: clamp(1.9rem, 4.5vw, 3rem);\n  --size-giant: clamp(2.6rem, 6.2vw, 5.6rem);\n  --size-giant-xl: clamp(2.9rem, 7.3vw, 6.6rem);\n  --size-ghost: clamp(5rem, 16vw, 15rem);\n  --size-lead: clamp(0.98rem, 1.8vw, 1.2rem);\n  --size-lead-sm: clamp(0.92rem, 1.5vw, 1.05rem);\n  --size-question: 16px;\n  --size-contact: 15px;\n  --size-button: 14px;\n  --size-body-sm: 14px;\n  --size-nav: 13px;\n  --size-caption: 13px;\n  --size-answer: 14px;\n  --size-side: 12.5px;\n  --size-footer: 12px;\n  --size-eyebrow: 11px;\n  --size-tick: 11px;\n  --size-micro: 10px;\n  --size-tooltip: 9px;\n\n  /* ── Line heights ── */\n  --leading-h1: 1.02;\n  --leading-giant: 1.04;\n  --leading-h2: 1.05;\n  --leading-tight: 1.12;\n  --leading-quote: 1.25;\n  --leading-contact: 1.5;\n  --leading-lead: 1.65;\n  --leading-body: 1.7;\n\n  /* ── Letter spacing ── */\n  --tracking-ghost: -0.04em;\n  --tracking-h1: -0.03em;\n  --tracking-h2: -0.025em;\n  --tracking-quote: -0.005em;\n  --tracking-giant: 0.005em;\n  --tracking-button: 0.02em;\n  --tracking-tick: 0.05em;\n  --tracking-caps-sm: 0.1em;\n  --tracking-caps: 0.16em;\n  --tracking-anno: 0.18em;\n  --tracking-eyebrow: 0.22em;\n  --tracking-counter: 0.3em;\n}\n\n/* Addept Automotive — spacing & radius tokens. */\n:root {\n  /* ── Spacing scale (px values observed in embed.js) ── */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 18px;\n  --space-5: 22px;\n  --space-6: 26px;\n  --space-7: 32px;\n  --space-8: 40px;\n  --space-9: 56px;\n  --space-10: 70px;   /* flow section vertical padding */\n\n  /* ── Page rhythm ── */\n  --pad-section-x: 7vw;            /* left-aligned cinema sections */\n  --pad-section-x-center: 6vw;\n  --pad-nav: 18px 32px;\n  --measure-lead: 30em;            /* lead paragraph max width */\n  --measure-flow: 1040px;          /* flow section max width */\n  --measure-faq: 820px;\n  --measure-contact: 900px;\n\n  /* ── Corner radii ── */\n  --radius-glass: 3px;     /* frosted service cards — near-sharp */\n  --radius-tooltip: 5px;\n  --radius-label: 7px;     /* annotation labels */\n  --radius-inner: 12px;    /* iframe inside cal panel */\n  --radius-box: 16px;      /* contact boxes */\n  --radius-panel: 18px;    /* white booking panel */\n  --radius-pill: 99px;     /* buttons, eyebrows, chips, capsules */\n}\n\n/* Addept Automotive — motion, shadow, blur & cinema-grade tokens. */\n:root {\n  /* ── Easing — one signature curve everywhere ── */\n  --ease-signature: cubic-bezier(0.2, 0.8, 0.2, 1); /* @kind other */\n  --duration-fast: 0.25s; /* @kind other */\n  --duration-base: 0.3s; /* @kind other */\n  --duration-slow: 0.35s; /* @kind other */\n  --duration-card: 0.45s; /* @kind other */\n\n  /* ── Shadows ── */\n  --shadow-btn: 0 18px 50px rgba(0, 0, 0, 0.35);\n  --shadow-btn-hover: 0 26px 60px rgba(0, 0, 0, 0.5);\n  --shadow-panel: 0 30px 80px rgba(0, 0, 0, 0.5);\n  /* frosted glass slab — \"double glazed\": stacked pane edges + chunky bevel + deep drop */\n  --shadow-glass:\n    -12px 14px 0 -1px rgba(196, 214, 209, 0.5),\n    -6px 7px 0 0 rgba(225, 236, 233, 0.55),\n    -2px 3px 0 0 rgba(245, 250, 248, 0.5),\n    0 44px 110px rgba(0, 0, 0, 0.5),\n    0 10px 26px rgba(0, 0, 0, 0.28),\n    inset 0 2px 0 rgba(255, 255, 255, 0.5),\n    inset 2px 0 0 rgba(255, 255, 255, 0.28),\n    inset 0 -2px 0 rgba(120, 128, 150, 0.28),\n    inset -2px 0 0 rgba(150, 156, 175, 0.2);\n\n  /* ── Blur ── */\n  --blur-glass: blur(18px) saturate(1.15); /* @kind other */\n\n  /* ── Cinema overlays ── */\n  --vignette: radial-gradient(ellipse 85% 75% at 50% 45%, transparent 35%, rgba(0, 0, 0, 0.6) 100%); /* @kind color */\n  --glow-amber: inset 0 0 140px 10px rgba(255, 166, 77, 0.5), inset 0 0 60px 4px rgba(255, 120, 40, 0.28); /* @kind shadow */\n  --fade-to-flow: linear-gradient(to bottom, rgba(5, 5, 5, 0), #050505); /* @kind color */\n  --grade-neutral: rgba(0, 0, 0, 0.4);              /* mid-journey dim */\n  --grade-warm: rgba(30, 14, 10, 0.4);              /* warm-tinted dim */\n  --grade-deep: rgba(0, 0, 0, 0.6);                 /* finale dim */\n\n  /* ── Hover/press grammar ── */\n  --lift-btn: translateY(-3px); /* @kind other */\n  --lift-card: translateY(-6px); /* @kind other */\n  --scale-btn: 1.04; /* @kind other */\n}\n\n<\u002Fstyle>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* cyrillic-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"00a08ba9-b242-4acd-8fd8-183f653ede09\") format( px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.65); }\n.eyebrow b { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,0.7); display: block; }\n.fhead h2 { margin: 16px 0 0; font-weight: 800; line-height: 1.05; letter-spacing: -0.025em; font-size: 44px; color: #fff; }\n.fhead p { margin: 18px auto 0; max-width: 30em; color: rgba(255,255,255,0.5); font-size: 16px; line-height: 1.6; }\n.col { max-width: 760px; margin: 0 auto; }\n.note { margin: 26px 0 0; color: rgba(255,255,255,0.35); font-size: 12px; line-height: 1.7; }\nsvg { stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }\n\n/* shared bracket corners */\n.brk > i { position: absolute; width: 13px; height: 13px; border-style: solid; border-color: rgba(255,255,255,0.8); border-width: 0; transition: border-color 0.3s var(--ease); }\n.brk > i.tl { top: 0; left: 0; border-top-width: 2px; border-left-width: 2px; }\n.brk > i.tr { top: 0; right: 0; border-top-width: 2px; border-right-width: 2px; }\n.brk > i.bl { bottom: 0; left: 0; border-bottom-width: 2px; border-left-width: 2px; }\n.brk > i.br { bottom: 0; right: 0; border-bottom-width: 2px; border-right-width: 2px; }\n.brk:hover > i { border-color: #fff; }\n\n/* ============ V1 — stacked full-width plates, arrow ============ */\n.v1col { display: flex; flex-direction: column; gap: 14px; }\n.v1 { position: relative; display: flex; align-items: center; gap: 22px; padding: 26px 30px; text-decoration: none; background: rgba(255,255,255,0.015); transition: background 0.3s var(--ease); }\n.v1:hover { background: rgba(255,255,255,0.045); }\n.v1 .ic { flex: none; color: rgba(255,255,255,0.6); }\n.v1 .ic svg { width: 22px; height: 22px; }\n.v1 .lab { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.4); margin-bottom: 6px; }\n.v1 .val { font-family: 'Space Grotesk', sans-serif; font-size: 21px; font-weight: 500; text-transform:
