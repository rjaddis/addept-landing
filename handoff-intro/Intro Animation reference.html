  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<title>Intro Animation<\u002Ftitle>\n\n<style>/* Addept Automotive — self-hosted webfonts (latin subsets from Google Fonts).\n   Inter: 400 / 600 / 700 / 800 · Space Grotesk: 500 / 700 */\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"8cac452a-a8d1-478e-8aef-8dfd3b71f776\") format('woff2');\n}\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"34ee24fd-ffd7-4f3c-97b6-dccf3139c516\") format('woff2');\n}\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"1479656d-c9fc-4fc2-a88f-22e46bd99def\") format('woff2');\n}\n@font-face {\n  font-family: 'Inter';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"6c2af40f-d4a5-420c-8f07-36e8a32e7d6c\") format('woff2');\n}\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 500;\n  font-display: swap;\n  src: url(\"566135ff-bb08-40e8-8460-4e6e6282574d\") format('woff2');\n}\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bb937081-f9a5-4b21-8ed2-7898883d0222\") format('woff2');\n}\n\n/* Addept Automotive — color tokens.\n   Source of truth: deploy/embed.js (addept-landing repo).\n   The system is monochrome cinema: pure black stage, white ink at strict\n   opacity tiers, one warm amber glow accent, and a near-black violet ink\n   reserved for frosted-glass card text. */\n:root {\n  /* ── Base palette ── */\n  --black: #000000;\n  --black-flow: #050505;          /* flow-mode body (booking / FAQ / contact) */\n  --black-capsule: rgba(10, 10, 10, 0.55);\n  --black-label: rgba(5, 5, 5, 0.78);\n  --white: #ffffff;\n  --ink-glass: #181520;           /* text & icons on frosted glass cards */\n  --amber-glow: rgba(255, 166, 77, 0.5);\n  --amber-glow-deep: rgba(255, 120, 40, 0.28);\n\n  /* ── White-opacity text ramp (use these, never new alphas) ── */\n  --text-max: #ffffff;                       /* hover / emphasis */\n  --text-primary: rgba(255, 255, 255, 0.9);  /* brand wordmark, strong UI */\n  --text-strong: rgba(255, 255, 255, 0.88);  /* FAQ questions, list titles */\n  --text-emphasis: rgba(255, 255, 255, 0.85);/* hours day labels */\n  --text-label: rgba(255, 255, 255, 0.78);   /* annotation labels */\n  --text-soft: rgba(255, 255, 255, 0.7);     /* chips */\n  --text-body: rgba(255, 255, 255, 0.58);    /* lead paragraphs */\n  --text-secondary: rgba(255, 255, 255, 0.55);/* eyebrows, side copy */\n  --text-answer: rgba(255, 255, 255, 0.5);   /* FAQ answers */\n  --text-muted: rgba(255, 255, 255, 0.45);   /* meta rows, hours values */\n  --text-faint: rgba(255, 255, 255, 0.38);   /* tick rows */\n  --text-dim: rgba(255, 255, 255, 0.35);     /* tiny captions, labels */\n  --text-disabled: rgba(255, 255, 255, 0.3); /* footnote contact line */\n  --text-footer: rgba(255, 255, 255, 0.25);  /* copyright */\n  --text-ghost: rgba(255, 255, 255, 0.07);   /* giant ghost words */\n\n  /* ── Hairlines & borders (white-opacity ramp) ── */\n  --border-strong: rgba(255, 255, 255, 0.25);   /* meta chips */\n  --border-ghost-btn: rgba(255, 255, 255, 0.22);/* ghost buttons */\n  --hairline: rgba(255, 255, 255, 0.22);        /* drawn rules */\n  --border-default: rgba(255, 255, 255, 0.18);  /* nav call pill */\n  --border-list: rgba(255, 255, 255, 0.14);     /* FAQ hairline list */\n  --border-subtle: rgba(255, 255, 255, 0.12);   /* eyebrows, labels */\n  --border-faint: rgba(255, 255, 255, 0.1);     /* scroll hint */\n  --border-whisper: rgba(255, 255, 255, 0.08);  /* contact boxes */\n  --border-footer: rgba(255, 255, 255, 0.06);   /* footer rule */\n\n  /* ── Surfaces ── */\n  --surface-page: var(--black);\n  --surface-flow: var(--black-flow);\n  --surface-capsule: var(--black-capsule);       /* eyebrows, ghost buttons */\n  --surface-overlay: rgba(0, 0, 0, 0.6);         /* scroll hint, dot tooltips */\n  --surface-overlay-strong: rgba(0, 0, 0, 0.7);\n  --surface-tint: rgba(255, 255, 255, 0.02);     /* contact boxes */\n  --surface-tint-hover: rgba(255, 255, 255, 0.05);\n  --surface-light: #ffffff;                      /* light buttons, cal panel */\n\n  /* ── Frosted glass card (Noomo-style fleet) ── */\n  --glass-gradient: linear-gradient(168deg, rgba(252, 253, 255, 0.16) 0%, rgba(237, 239, 246, 0.085) 42%, rgba(196, 201, 215, 0.14) 100%); /* @kind color */\n  --glass-fill: rgba(237, 239, 246, 0.085);\n  --glass-border: rgba(255, 255, 255, 0.22);\n  --glass-ink: var(--ink-glass);\n}\n\n/* Addept Automotive — typography tokens.\n   Two faces only: Inter carries everything; Space Grotesk (uppercase, medium)\n   is reserved for \"giant\" cinematic statements. */\n:root {\n  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;\n  --font-display: 'Space Grotesk', 'Inter', sans-serif;\n\n  /* ── Weights ── */\n  --weight-regular: 400;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n  --weight-heavy: 800;     /* all Inter headlines */\n  --weight-giant: 500;     /* Space Grotesk statements */\n\n  /* ── Sizes (fluid) ── */\n  --size-h1: clamp(2.6rem, 7vw, 5rem);\n  --size-h1-compact: clamp(2.2rem, 5.5vw, 3.8rem);\n  --size-h2: clamp(1.9rem, 4.5vw, 3rem);\n  --size-giant: clamp(2.6rem, 6.2vw, 5.6rem);\n  --size-giant-xl: clamp(2.9rem, 7.3vw, 6.6rem);\n  --size-ghost: clamp(5rem, 16vw, 15rem);\n  --size-lead: clamp(0.98rem, 1.8vw, 1.2rem);\n  --size-lead-sm: clamp(0.92rem, 1.5vw, 1.05rem);\n  --size-question: 16px;\n  --size-contact: 15px;\n  --size-button: 14px;\n  --size-body-sm: 14px;\n  --size-nav: 13px;\n  --size-caption: 13px;\n  --size-answer: 14px;\n  --size-side: 12.5px;\n  --size-footer: 12px;\n  --size-eyebrow: 11px;\n  --size-tick: 11px;\n  --size-micro: 10px;\n  --size-tooltip: 9px;\n\n  /* ── Line heights ── */\n  --leading-h1: 1.02;\n  --leading-giant: 1.04;\n  --leading-h2: 1.05;\n  --leading-tight: 1.12;\n  --leading-quote: 1.25;\n  --leading-contact: 1.5;\n  --leading-lead: 1.65;\n  --leading-body: 1.7;\n\n  /* ── Letter spacing ── */\n  --tracking-ghost: -0.04em;\n  --tracking-h1: -0.03em;\n  --tracking-h2: -0.025em;\n  --tracking-quote: -0.005em;\n  --tracking-giant: 0.005em;\n  --tracking-button: 0.02em;\n  --tracking-tick: 0.05em;\n  --tracking-caps-sm: 0.1em;\n  --tracking-caps: 0.16em;\n  --tracking-anno: 0.18em;\n  --tracking-eyebrow: 0.22em;\n  --tracking-counter: 0.3em;\n}\n\n/* Addept Automotive — spacing & radius tokens. */\n:root {\n  /* ── Spacing scale (px values observed in embed.js) ── */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 18px;\n  --space-5: 22px;\n  --space-6: 26px;\n  --space-7: 32px;\n  --space-8: 40px;\n  --space-9: 56px;\n  --space-10: 70px;   /* flow section vertical padding */\n\n  /* ── Page rhythm ── */\n  --pad-section-x: 7vw;            /* left-aligned cinema sections */\n  --pad-section-x-center: 6vw;\n  --pad-nav: 18px 32px;\n  --measure-lead: 30em;            /* lead paragraph max width */\n  --measure-flow: 1040px;          /* flow section max width */\n  --measure-faq: 820px;\n  --measure-contact: 900px;\n\n  /* ── Corner radii ── */\n  --radius-glass: 3px;     /* frosted service cards — near-sharp */\n  --radius-tooltip: 5px;\n  --radius-label: 7px;     /* annotation labels */\n  --radius-inner: 12px;    /* iframe inside cal panel */\n  --radius-box: 16px;      /* contact boxes */\n  --radius-panel: 18px;    /* white booking panel */\n  --radius-pill: 99px;     /* buttons, eyebrows, chips, capsules */\n}\n\n/* Addept Automotive — motion, shadow, blur & cinema-grade tokens. */\n:root {\n  /* ── Easing — one signature curve everywhere ── */\n  --ease-signature: cubic-bezier(0.2, 0.8, 0.2, 1); /* @kind other */\n  --duration-fast: 0.25s; /* @kind other */\n  --duration-base: 0.3s; /* @kind other */\n  --duration-slow: 0.35s; /* @kind other */\n  --duration-card: 0.45s; /* @kind other */\n\n  /* ── Shadows ── */\n  --shadow-btn: 0 18px 50px rgba(0, 0, 0, 0.35);\n  --shadow-btn-hover: 0 26px 60px rgba(0, 0, 0, 0.5);\n  --shadow-panel: 0 30px 80px rgba(0, 0, 0, 0.5);\n  /* frosted glass slab: offset slabs + deep drop + inner bevel */\n  --shadow-glass:\n    -5px 6px 0 -1px rgba(204, 208, 221, 0.38),\n    -2px 3px 0 0 rgba(226, 229, 238, 0.42),\n    0 34px 90px rgba(0, 0, 0, 0.42),\n    0 6px 18px rgba(0, 0, 0, 0.22),\n    inset 0 1px 0 rgba(255, 255, 255, 0.3),\n    inset -1px -1px 0 rgba(150, 156, 175, 0.18);\n\n  /* ── Blur ── */\n  --blur-glass: blur(16px) saturate(1.12); /* @kind other */\n\n  /* ── Cinema overlays ── */\n  --vignette: radial-gradient(ellipse 85% 75% at 50% 45%, transparent 35%, rgba(0, 0, 0, 0.6) 100%); /* @kind color */\n  --glow-amber: inset 0 0 140px 10px rgba(255, 166, 77, 0.5), inset 0 0 60px 4px rgba(255, 120, 40, 0.28); /* @kind shadow */\n  --fade-to-flow: linear-gradient(to bottom, rgba(5, 5, 5, 0), #050505); /* @kind color */\n  --grade-neutral: rgba(0, 0, 0, 0.4);              /* mid-journey dim */\n  --grade-warm: rgba(30, 14, 10, 0.4);              /* warm-tinted dim */\n  --grade-deep: rgba(0, 0, 0, 0.6);                 /* finale dim */\n\n  /* ── Hover/press grammar ── */\n  --lift-btn: translateY(-3px); /* @kind other */\n  --lift-card: translateY(-6px); /* @kind other */\n  --scale-btn: 1.04; /* @kind other */\n}\n\n<\u002Fstyle>\n<style>\nhtml, body { margin: 0; background: #000; }\nbody { font-family: var(--font-sans); }\n\n/* ── Intro stage ── */\n.intro { position: relative; height: 100vh; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #000; }\n.glow { position: absolute; inset: 0; box-shadow: var(--glow-amber); opacity: 0; pointer-events: none; }\n.intro.play .glow { animation: glow-in 1.8s var(--ease-signature) 0.25s forwards, breathe 7s ease-in-out 2.4s infinite; }\n@keyframes glow-in { to { opacity: 1; } }\n@keyframes breathe { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }\n\n.badge-wrap { position: relative; display: flex; flex-direction: column; align-items: center; gap: 34px; }\n.badge { width: min(58vw, 620px); opacity: 0; transform: scale(0.55) translateY(16px); filter: blur(14px) drop-shadow(0 40px 90px rgba(0,0,0,0.7)); }\n.intro.play .badge { animation: badge-in 1.4s var(--ease-signature) 0.9s forwards; }\n@keyframes badge-in {\n  60% { filter: blur(0px) drop-shadow(0 40px 90px rgba(0,0,0,0.7)); }\n  100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0px) drop-shadow(0 40px 90px rgba(0,0,0,0.7)); }\n}\n\n.est { display: flex; align-items: center; gap: 16px; opacity: 0; transform: translateY(0.9em); }\n.intro.play .est { animation: rise 0.8s var(--ease-signature) 2s forwards; }\n.est i { display: block; width: 54px; height: 1px; background: var(--hairline); transform: scaleX(0); }\n.intro.play .est i.l { animation: draw 0.7s var(--ease-signature) 2.3s forwards; transform-origin: right; }\n.intro.play .est i.r { animation: draw 0.7s var(--ease-signature) 2.3s forwards; transform-origin: left; }\n.est span { font-size: var(--size-eyebrow); letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--text-secondary); white-space: nowrap; }\n@keyframes rise { to { opacity: 1; transform: translateY(0); } }\n@keyframes draw { to { transform: scaleX(1); } }\n\n.hint { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 8px; padding: 7px 16px; border-radius: var(--radius-pill); border: 1px solid var(--border-faint); background: var(--surface-overlay); color: var(--text-dim); font-size: var(--size-micro); letter-spacing: var(--tracking-caps-sm); text-transform: uppercase; opacity: 0; }\n.intro.play .hint { animation: rise 0.8s var(--ease-signature) 2.8s forwards; }\n.hint svg { width: 13px; height: 13px; animation: bounce 1.6s infinite; }\n@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(4px); } }\n\n.replay { position: fixed; right: 18px; bottom: 18px; z-index: 50; padding: 7px 16px; border-radius: var(--radius-pill); border: 1px solid var(--border-ghost-btn); background: var(--black-capsule); color: var(--text-soft); font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer; transition: all var(--duration-base) var(--ease-signature); }\n.replay:hover { background: #fff; color: #000; }\n\n@media (prefers-reduced-motion: reduce) {\n  .intro .glow, .intro .badge, .intro .est, .intro .est i, .intro .hint { animation: none !important; opacity: 1 !important; transform: none !important; filter: blur(0) drop-shadow(0 40px 90px rgba(0,0,0,0.7)) !important; }\n}\n\n/* ── Hero (follows the intro) ── */\n.hero { position: relative; height: 100vh; overflow: hidden; display: flex; align-items: center; background: #000 url(\"16cff7fb-6e18-4db9-823f-13da660e833a\") center / cover no-repeat; }\n.hero .vig { position: absolute; inset: 0; background: var(--vignette); }\n.hero .grade { position: absolute; inset: 0; background: rgba(0,0,0,0.3); }\n.nav { position: absolute; top: 0; left: 0; right: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 18px 32px; }\n.wordmark { font-size: 15px; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; text-decoration: none; }\n.wordmark b { font-weight: 800; }\n.wordmark span { font-weight: 400; color: rgba(255,255,255,0.75); }\n.call { display: inline-flex; padding: 9px 20px; border-radius: var(--radius-pill); border: 1px solid var(--border-default); background: var(--black-capsule); color: rgba(255,255,255,0.8); font-size: var(--size-nav); font-weight: 600; letter-spacing: 0.02em; text-decoration: none; transition: all var(--duration-base) var(--ease-signature); }\n.call:hover { background: #fff; color: #000; transform: scale(1.04); }\n.hero-content { position: relative; z-index: 5; padding: 0 5vw 0 7vw; max-width: 820px; }\n.eyebrow { display: inline-flex; padding: 5px 13px; border-radius: var(--radius-pill); border: 1px solid var(--border-subtle); background: var(--surface-capsule); font-size: var(--size-eyebrow); letter-spacing: var(--tracking-eyebrow); text-transform: uppercase; color: var(--text-secondary); }\n.hero h1 { margin: 22px 0 0; font-size: var(--size-h1); font-weight: var(--weight-heavy); line-height: var(--leading-h1); letter-spacing: var(--tracking-h1); color: #fff; }\n.rule { height: 1px; background: var(--hairline); margin: 26px 0; max-width: 420px; }\n.hero p { margin: 0; font-size: var(--size-lead); line-height: var(--leading-lead); color: var(--text-body); max-width: 30em; }\n.cta { margin-top: 30px; display: flex; gap: 14px; align-items: center; }\n.btn-light { display: inline-flex; padding: 14px 30px; border-radius: var(--radius-pill); background: #fff; color: #000; font-size: var(--size-button); font-weight: 700; letter-spacing: var(--tracking-button); text-decoration: none; box-shadow: var(--shadow-btn); transition: all var(--duration-base) var(--ease-signature); }\n.btn-light:hover { transform: translateY(-3px) scale(1.04); box-shadow: var(--shadow-btn-hover); }\n.btn-ghost { display: inline-flex; padding: 14px 30px; border-radius: var(--radius-pill); border: 1px solid var(--border-ghost-btn); background: rgba(20,20,20,0.55); color: #fff; font-size: var(--size-button); font-weight: 700; letter-spacing: var(--tracking-button); text-decoration: none; transition: all var(--duration-base) var(--ease-signature); }\n.btn-ghost:hover { background: #fff; color: #000; transform: translateY(-3px); }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<section class=\"intro play\" id=\"intro\" data-screen-label=\"Intro\">\n  <div class=\"glow\"><\u002Fdiv>\n  <div class=\"badge-wrap\">\n    <img class=\"badge\" src=\"97003cc7-137f-465c-94d1-a20640790a16\" alt=\"Addept Automotive\">\n    <div class=\"est\">\n      <i class=\"l\"><\u002Fi>\n      <span>Frankton · Queenstown · Est. 2019<\u002Fspan>\n      <i class=\"r\"><\u002Fi>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"hint\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n    Scroll\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"hero\" data-screen-label=\"Hero\">\n  <div class=\"vig\"><\u002Fdiv>\n  <div class=\"grade\"><\u002Fdiv>\n  <div class=\"nav\">\n    <a class=\"wordmark\" href=\"#intro\"><b>Addept<\u002Fb> <span>Automotive<\u002Fspan><\u002Fa>\n    <a class=\"call\" href=\"#\">Call now<\u002Fa>\n  <\u002Fdiv>\n  <div class=\"hero-content\">\n    <span class=\"eyebrow\">Queenstown · Independent Mechanics<\u002Fspan>\n    <h1>Your vehicle,<br>running at its best.<\u002Fh1>\n    <div class=\"rule\"><\u002Fdiv>\n    <p>First-rate servicing, diagnostics and repairs — specialising in European and Japanese vehicles, with top-tier customer care and respect for your budget.<\u002Fp>\n    <div class=\"cta\">\n      <a class=\"btn-light\" href=\"#\">Make a booking<\u002Fa>\n      <a class=\"btn-ghost\" href=\"#\">Call 027 439 3403<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<button class=\"replay\" type=\"button\" id=\"replay\">Replay intro<\u002Fbutton>\n\n<script>\ndocument.getElementById('replay').addEventListener('click', function () {\n  var intro = document.getElementById('intro');\n  window.scrollTo({ top: 0, behavior: 'auto' });\n  intro.classList.remove('play');\n  void intro.offsetWidth;\n  intro.classList.add('play');\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
